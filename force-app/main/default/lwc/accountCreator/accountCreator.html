<template>
    <lightning-card title="Accounts" icon-name="standard:account">

        <!-- Button -->
        <div class="slds-p-horizontal_medium slds-m-bottom_small">
            <lightning-button 
                label="Add Account" 
                variant="brand"
                onclick={handleToggle}>
            </lightning-button>
        </div>

        <!-- Form -->
        <template if:true={showForm}>
            <div class="form-container slds-p-around_medium slds-m-around_medium">

                <lightning-input 
                    label="Account Name"
                    value={account.Name}
                    data-field="Name"
                    onchange={handleChange}
                    required>
                </lightning-input>

                <lightning-input 
                    label="Account Number"
                    value={account.AccountNumber}
                    data-field="AccountNumber"
                    onchange={handleChange}
                    required>
                </lightning-input>

                <lightning-combobox
                    label="Industry"
                    value={account.Industry}
                    options={industryOptions}
                    data-field="Industry"
                    onchange={handleChange}>
                </lightning-combobox>

                <!-- Buttons -->
                <div class="button-group slds-m-top_medium">
                    <lightning-button 
                        label="Save" 
                        variant="brand"
                        onclick={handleSave}>
                    </lightning-button>

                    <lightning-button 
                        label="Cancel" 
                        variant="neutral"
                        class="slds-m-left_small"
                        onclick={handleCancel}>
                    </lightning-button>
                </div>

            </div>
        </template>

    </lightning-card>
</template>
